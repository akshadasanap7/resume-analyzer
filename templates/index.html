<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Resume Screening System</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 18px 32px; font-size: 1.4rem; font-weight: 700; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 16px; }
    .card { background: white; border-radius: 10px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h2 { font-size: 1.1rem; margin-bottom: 16px; color: #1a1a2e; }
    textarea { width: 100%; height: 130px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; resize: vertical; }
    input[type="file"] { margin-top: 8px; }
    button { margin-top: 12px; padding: 10px 24px; background: #1a1a2e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #16213e; }
    .tag { display: inline-block; background: #e8f0fe; color: #1a73e8; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; margin: 3px; }
    .tag.missing { background: #fce8e6; color: #d93025; }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .stat-box { flex: 1; min-width: 160px; background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-box .val { font-size: 2rem; font-weight: 700; color: #1a1a2e; }
    .stat-box .lbl { font-size: 0.85rem; color: #666; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #1a1a2e; color: white; padding: 10px 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
    tr:hover td { background: #f9f9f9; }
    .score-bar { height: 8px; background: #e0e0e0; border-radius: 4px; margin-top: 4px; }
    .score-fill { height: 8px; border-radius: 4px; background: linear-gradient(90deg, #1a73e8, #34a853); }
    .medal { font-size: 1.2rem; }
    #charts { display: flex; gap: 16px; flex-wrap: wrap; }
    #charts > div { flex: 1; min-width: 300px; }
    .hidden { display: none; }
    #status { color: #1a73e8; font-size: 0.9rem; margin-top: 8px; }
  </style>
</head>
<body>
<header>🤖 AI-Powered Resume Screening & Candidate Ranking System</header>
<div class="container">

  <!-- Step 1: Job Description -->
  <div class="card">
    <h2>Step 1 — Upload Job Description</h2>
    <textarea id="jdText" placeholder="Paste the job description here..."></textarea>
    <button onclick="uploadJD()">Analyze JD</button>
    <div id="jdSkills" style="margin-top:12px;"></div>
  </div>

  <!-- Step 2: Resumes -->
  <div class="card">
    <h2>Step 2 — Upload Resumes (PDF / DOCX)</h2>
    <input type="file" id="resumeFiles" multiple accept=".pdf,.docx" />
    <button onclick="uploadResumes()">Screen Resumes</button>
    <div id="status"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <div class="stats" id="statsRow"></div>

    <div class="card">
      <h2>📊 Candidate Rankings</h2>
      <table>
        <thead>
          <tr><th>#</th><th>Candidate</th><th>Email</th><th>Experience</th><th>Skills Matched</th><th>ATS Score</th><th>Missing Skills</th></tr>
        </thead>
        <tbody id="rankTable"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>📈 Analytics</h2>
      <div id="charts">
        <div id="chartScores"></div>
        <div id="chartSkills"></div>
      </div>
    </div>
  </div>

</div>

<script>
async function uploadJD() {
  const jd = document.getElementById("jdText").value.trim();
  if (!jd) return alert("Please enter a job description.");
  const fd = new FormData();
  fd.append("jd_text", jd);
  const res = await fetch("/upload_jd", { method: "POST", body: fd });
  const data = await res.json();
  if (data.error) return alert(data.error);
  const container = document.getElementById("jdSkills");
  container.innerHTML = "<strong>Detected Required Skills:</strong><br>" +
    data.skills.map(s => `<span class="tag">${s}</span>`).join("");
}

async function uploadResumes() {
  const files = document.getElementById("resumeFiles").files;
  if (!files.length) return alert("Please select resume files.");
  const fd = new FormData();
  for (const f of files) fd.append("resumes", f);
  document.getElementById("status").textContent = "⏳ Processing resumes...";
  const res = await fetch("/upload_resumes", { method: "POST", body: fd });
  const data = await res.json();
  if (data.error) { document.getElementById("status").textContent = "❌ " + data.error; return; }
  document.getElementById("status").textContent = `✅ ${data.length} resume(s) processed.`;
  renderDashboard(data);
}

function medals(i) { return ["🥇","🥈","🥉"][i] || (i+1); }

function renderDashboard(candidates) {
  document.getElementById("dashboard").classList.remove("hidden");

  // Stats
  const avg = Math.round(candidates.reduce((s,c) => s + c.ats.total, 0) / candidates.length);
  const top = candidates[0];
  const allSkills = candidates.flatMap(c => c.skills);
  const skillFreq = {};
  allSkills.forEach(s => skillFreq[s] = (skillFreq[s]||0)+1);
  const topSkills = Object.entries(skillFreq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);

  document.getElementById("statsRow").innerHTML = `
    <div class="stat-box"><div class="val">${candidates.length}</div><div class="lbl">Total Resumes</div></div>
    <div class="stat-box"><div class="val">${avg}</div><div class="lbl">Avg ATS Score</div></div>
    <div class="stat-box"><div class="val">${top.name}</div><div class="lbl">🏆 Top Candidate</div></div>
    <div class="stat-box"><div class="val" style="font-size:1rem">${topSkills.join(", ")}</div><div class="lbl">Top Skills</div></div>
  `;

  // Table
  const tbody = document.getElementById("rankTable");
  tbody.innerHTML = candidates.map((c, i) => `
    <tr>
      <td><span class="medal">${medals(i)}</span></td>
      <td><strong>${c.name}</strong><br><small>${c.filename}</small></td>
      <td>${c.email || "—"}</td>
      <td>${c.experience} yr${c.experience !== 1 ? "s" : ""}</td>
      <td>
        ${c.ats.matched_skills.map(s=>`<span class="tag">${s}</span>`).join("") || "—"}
        <br><small>${c.ats.match_percent}% match</small>
      </td>
      <td>
        <strong>${c.ats.total}/100</strong>
        <div class="score-bar"><div class="score-fill" style="width:${c.ats.total}%"></div></div>
      </td>
      <td>${c.ats.missing_skills.map(s=>`<span class="tag missing">${s}</span>`).join("") || "✅ None"}</td>
    </tr>
  `).join("");

  // Chart 1: ATS Scores
  Plotly.newPlot("chartScores", [{
    type: "bar",
    x: candidates.map(c => c.name),
    y: candidates.map(c => c.ats.total),
    marker: { color: candidates.map(c => c.ats.total >= 80 ? "#34a853" : c.ats.total >= 60 ? "#fbbc04" : "#ea4335") },
    text: candidates.map(c => c.ats.total),
    textposition: "outside"
  }], {
    title: "ATS Score Distribution",
    yaxis: { range: [0, 105] },
    margin: { t: 40, b: 60 }
  }, { responsive: true });

  // Chart 2: Skill Frequency
  const sfEntries = Object.entries(skillFreq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  Plotly.newPlot("chartSkills", [{
    type: "bar", orientation: "h",
    x: sfEntries.map(e=>e[1]),
    y: sfEntries.map(e=>e[0]),
    marker: { color: "#1a73e8" }
  }], {
    title: "Top Skills Across Candidates",
    margin: { t: 40, l: 120 }
  }, { responsive: true });
}
</script>
</body>
</html>
